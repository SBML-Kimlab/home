<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software - SBML | UNIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="page-header">
        <h1>Software & Tools</h1>
        <p>Open-source tools developed by our lab</p>
    </div>

    <section>
        <div class="container">
            <div class="software-grid" id="software-list"></div>

            <div style="background: var(--bg-light); padding: 50px; border-radius: 16px; margin-top: 80px; text-align: center;">
                <h2 style="font-size: 32px; color: var(--primary); margin-bottom: 20px;">
                    <i class="ri-open-source-line"></i> Open Source Commitment
                </h2>
                <p style="font-size: 18px; color: var(--text-light); max-width: 800px; margin: 0 auto;">
                    We believe in open science and make our software tools publicly available. 
                    All tools are released under permissive licenses to enable reproducible research and community contributions.
                </p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="software-data.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('software-list');
            let html = '';

            softwareData.forEach(tool => {
                const tagsHtml = tool.tags.map(tag => 
                    `<span class="tag">${tag}</span>`
                ).join('');
                
                const linksHtml = tool.links.map(link => {
                    const btnClass = link.type === 'primary' ? 'btn' : 'btn btn-secondary';
                    return `
                        <a href="${link.url}" class="${btnClass}">
                            <i class="${link.icon || 'ri-link'}"></i>
                            ${link.text}
                        </a>`;
                }).join('');

                html += `
                    <div class="software-card">
                        <div class="software-icon">
                            <i class="${tool.icon}"></i>
                        </div>
                        <h3>${tool.title}</h3>
                        <p class="description">${tool.desc}</p>
                        <div class="tags">${tagsHtml}</div>
                        <div class="links">${linksHtml}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        });
    </script>
</body>
</html>
