<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - SBML | UNIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="page-header">
        <h1>Lab Members</h1>
        <p>Meet our research team</p>
    </div>

    <section style="background: white;">
        <div class="container" id="pi-container"></div>
    </section>

    <section style="background: var(--bg-light);">
        <div class="container">
            <h2 class="section-title">Graduate Students</h2>
            <div class="members-grid" id="students-grid"></div>
        </div>
    </section>

    <section style="background: white;">
        <div class="container">
            <h2 class="section-title">Undergraduate Researchers</h2>
            <div class="members-grid" id="undergrad-grid"></div>
        </div>
    </section>

    <section style="background: var(--bg-light);">
        <div class="container">
            <h2 class="section-title">Alumni</h2>
            <div class="alumni-section" id="alumni-container"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="img01">
        <div id="caption"></div>
    </div>

    <script src="members-data.js"></script>
    <script src="common.js"></script>
    
    <script>
        // --- 1. 모달(사진 확대) 관련 기능 ---
        function openModal(imgSrc, captionText) {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("img01");
            const caption = document.getElementById("caption");
            
            modal.style.display = "block";
            modalImg.src = imgSrc;
            caption.innerHTML = captionText;
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }

        // 배경 클릭 시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById("imageModal");
            if (event.target == modal) {
                closeModal();
            }
        }

        // 키보드 ESC 누르면 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") closeModal();
        });

        // --- 2. 데이터 렌더링 ---
        document.addEventListener('DOMContentLoaded', function() {
            // PI 정보 렌더링
            const pi = membersData.pi;
            
            // 사진 유무 확인 및 모달 연결
            let piPhotoContent = '';
            if (pi.img && pi.img.trim() !== "") {
                piPhotoContent = `<img src="member-photo/${pi.img}" alt="${pi.name}" onclick="openModal(this.src, '${pi.name}')">`;
            } else {
                piPhotoContent = `<i class="ri-user-line"></i>`;
            }

            document.getElementById('pi-container').innerHTML = `
                <h2 class="section-title">Principal Investigator</h2>
                <div class="pi-card">
                    <div class="pi-photo">
                        ${piPhotoContent}
                    </div>
                    <h2>${pi.name}</h2>
                    <p class="title">${pi.title}</p>
                    <p class="bio">${pi.affiliation}</p>
                    <p class="bio">${pi.education.join('<br>')}</p>
                    <div class="contact">
                        <a href="mailto:${pi.email}">
                            <i class="ri-mail-line"></i> ${pi.email}
                        </a>
                        <a href="${pi.website}" target="_blank">
                            <i class="ri-globe-line"></i> Personal Website
                        </a>
                    </div>
                </div>
            `;

            // 학생 및 학부생 렌더링 함수
            function renderMembers(list, containerId) {
                const container = document.getElementById(containerId);
                let html = '';
                list.forEach(member => {
                    let iconContent = '';
                    if (member.img && member.img.trim() !== "") {
                        iconContent = `<img src="member-photo/${member.img}" alt="${member.name}" onclick="openModal(this.src, '${member.name}')">`;
                    } else {
                        iconContent = `<i class="${member.icon || 'ri-user-line'}"></i>`;
                    }

                    html += `
                        <div class="member-card">
                            <div class="member-icon">
                                ${iconContent}
                            </div>
                            <h3>${member.name}</h3>
                            <p class="degree">${member.degree}</p>
                            <p class="info">${member.info}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            renderMembers(membersData.students, 'students-grid');
            renderMembers(membersData.undergraduate, 'undergrad-grid');

            // 졸업생(Alumni) 렌더링
            const alumniContainer = document.getElementById('alumni-container');
            let alumniHtml = '';
            
            const categories = [
                { id: 'phd', title: 'Ph.D. Graduates' },
                { id: 'ms', title: 'M.S. Graduates' },
                { id: 'postdoc', title: 'Postdocs' }
            ];

            categories.forEach((cat, index) => {
                if (membersData.alumni[cat.id] && membersData.alumni[cat.id].length > 0) {
                    const style = index === 0 
                        ? 'font-size: 24px; color: var(--primary); margin-bottom: 30px;' 
                        : 'font-size: 24px; color: var(--primary); margin: 40px 0 30px 0;';
                    
                    alumniHtml += `<h3 style="${style}">${cat.title}</h3>`;
                    alumniHtml += `<ul class="alumni-list" style="list-style: none; padding: 0;">`;
                    membersData.alumni[cat.id].forEach(person => {
                        alumniHtml += `<li>${person}</li>`;
                    });
                    alumniHtml += `</ul>`;
                }
            });
            
            alumniContainer.innerHTML = alumniHtml;
        });
    </script>
</body>
</html>
