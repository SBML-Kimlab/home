<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - SBML | UNIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="page-header">
        <h1>News & Achievements</h1>
        <p>Latest updates from our lab</p>
    </div>

    <section>
        <div class="container" id="news-container"></div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="news-data.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('news-container');
            let currentYear = null;

            newsData.forEach(item => {
                if (item.year !== currentYear) {
                    currentYear = item.year;
                    const yearTitle = document.createElement('h2');
                    yearTitle.className = 'year-title';
                    if (container.children.length > 0) {
                        yearTitle.style.marginTop = '60px';
                    }
                    yearTitle.textContent = currentYear;
                    container.appendChild(yearTitle);
                }

                const newsItem = document.createElement('div');
                newsItem.className = 'news-item';
                // 사진 관련 코드 제거됨 (순수 텍스트)
                newsItem.innerHTML = `
                    <p class="news-date">${item.month} ${item.year}</p>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <span class="badge">${item.tag}</span>
                `;
                container.appendChild(newsItem);
            });
        });
    </script>
</body>
</html>
