<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications - SBML | UNIST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="page-header">
        <h1>Publications</h1>
        <p>Scientific contributions and research outputs</p>
    </div>

    <section>
        <div class="container">
            <div class="note">
                <p><strong>Note:</strong> # denotes co-first author, * denotes corresponding author</p>
            </div>

            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="submitted">Submitted</button>
                <button class="filter-btn" data-filter="2025">2025</button>
                <button class="filter-btn" data-filter="2024">2024</button>
                <button class="filter-btn" data-filter="2023">2023</button>
                <button class="filter-btn" data-filter="2022">2022</button>
                <button class="filter-btn" data-filter="2021">2021</button>
                <button class="filter-btn" data-filter="2020">2020</button>
                <button class="filter-btn" data-filter="older">2019-2009</button>
                <button class="filter-btn" data-filter="patents">Patents</button>
                <button class="filter-btn" data-filter="conference">Conference</button>
            </div>

            <div id="publication-list"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="publications-data.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('publication-list');
            const buttons = document.querySelectorAll('.filter-btn');

            const numberedCategories = ["2025", "2024", "2023", "2022", "2021", "2020", "older"];
            
            let totalPapers = 0;
            numberedCategories.forEach(key => {
                if(publicationsData[key] && publicationsData[key].items) {
                    totalPapers += publicationsData[key].items.length;
                }
            });

            let currentNumber = totalPapers;
            numberedCategories.forEach(key => {
                if(publicationsData[key] && publicationsData[key].items) {
                    publicationsData[key].items.forEach(item => {
                        item.displayNumber = currentNumber--;
                    });
                }
            });

            function renderPublications(filter) {
                container.innerHTML = '';
                const displayOrder = ["submitted", "2025", "2024", "2023", "2022", "2021", "2020", "older", "patents", "conference"];

                displayOrder.forEach(key => {
                    const sectionData = publicationsData[key];
                    if (!sectionData) return;

                    let shouldShow = false;
                    if (filter === 'all') {
                        shouldShow = true;
                    } else {
                        shouldShow = (filter === key);
                    }

                    if (shouldShow) {
                        const sectionEl = document.createElement('div');
                        sectionEl.className = 'year-section fade-in';
                        sectionEl.id = key;

                        const titleEl = document.createElement('h2');
                        titleEl.className = 'year-title';
                        titleEl.textContent = sectionData.title;
                        sectionEl.appendChild(titleEl);

                        sectionData.items.forEach(item => {
                            const pubItem = document.createElement('div');
                            pubItem.className = 'pub-item';

                            let displayTitle = item.title;
                            if (item.displayNumber) {
                                displayTitle = `${item.displayNumber}. ${item.title}`;
                            }

                            let html = `
                                <h3>${displayTitle}</h3>
                                <p class="pub-authors">${item.authors}</p>
                                <div class="pub-meta">
                                    <span class="pub-journal">${item.journal}</span>
                            `;

                            if (item.year) {
                                html += `<span class="pub-year">${item.year}</span>`;
                            }

                            if (item.doi) {
                                let linkUrl = "";
                                if (item.link) {
                                    linkUrl = item.link;
                                } else if (item.doi.startsWith("http")) {
                                    linkUrl = item.doi;
                                } else {
                                    linkUrl = `https://doi.org/${item.doi}`;
                                }
                                html += `<a href="${linkUrl}" class="pub-doi" target="_blank">${item.doi}</a>`;
                            }

                            html += `</div>`;
                            pubItem.innerHTML = html;
                            sectionEl.appendChild(pubItem);
                        });

                        container.appendChild(sectionEl);
                    }
                });
            }

            renderPublications('all');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const filter = btn.getAttribute('data-filter');
                    renderPublications(filter);
                });
            });
        });
    </script>
</body>
</html>\
